<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" sizes="32x32" href="/assets/images/favicon-32x32.png" type="image/png">
    <title>Frontend Mentor - Blog preview card</title>
</head>

<body>
    <main>
        <div class="container">
            <img src="./assets/images/illustration-article.svg" alt="imagem principal" class="card-image">

            <div>
                <h2 class="content">Learning</h2>
            </div>

            <div class="info">
                <span class="data">Published 21 Dec 2023</span>

                <h1 class="title">HTML & CSS foundations</h1>

                <p class="description">These languages are the backbone of every website, defining structure, content,
                    and presentation.</p>
            </div>

            <div>
                <img src="./assets/images/image-avatar.webp" alt="Avatar de Greg Hooper">

                <p class="name">Greg Hooper</p>
            </div>
        </div>

        <footer class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
            Coded by <a href="#">Thalita Silva</a>.
        </footer>
    </main>
</body>
</html>
