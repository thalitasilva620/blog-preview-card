<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" sizes="32x32" href="./assets/images/favicon-32x32.png" type="image/png">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/variables.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <title>Frontend Mentor - Blog preview card</title>
</head>

<body>
    <main>
        <div class="card">
            <img src="./assets/images/illustration-article.svg" alt="Avatar de Greg Hooper" class="card-image">

            <div class="sub-title">
                <h2 class="content">Learning</h2>
            </div>


            <span class="data">Published 21 Dec 2023</span>     

            <a href="#" class="title">HTML & CSS foundations</a>

            <p class="description">These languages are the backbone of every website, defining structure, content,
                and presentation.
            </p>


            <div class="user">
                <img src="./assets/images/image-avatar.webp" alt="Avatar de Greg Hooper" class="avatar">

                <p class="name">Greg Hooper</p>
            </div>
        </div>
    </main>

    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a> | 
        Coded by <a href="#">Thalita Silva</a>
    </footer>
</body>

</html>
